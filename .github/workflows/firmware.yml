name: Build and Upload Firmware

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v6

      - name: Determine version bump
        id: bump
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ "$TITLE" =~ ^MAJOR ]]; then
            echo "type=MAJOR" >> $GITHUB_OUTPUT
          elif [[ "$TITLE" =~ ^MINOR ]]; then
            echo "type=MINOR" >> $GITHUB_OUTPUT
          elif [[ "$TITLE" =~ ^PATCH ]]; then
            echo "type=PATCH" >> $GITHUB_OUTPUT
          else
            echo "::error::PR title must start with MAJOR, MINOR, or PATCH"
            exit 1
          fi

      - name: Get current version from server and bump
        id: version
        run: |
          RESPONSE=$(curl -sf "${{ secrets.SERVER_URL }}/firmware/latest" || echo '{}')
          CURRENT=$(echo "$RESPONSE" | jq -r '.version // "0.0.0"')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ steps.bump.outputs.type }}" in
            MAJOR) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            MINOR) MINOR=$((MINOR + 1)); PATCH=0 ;;
            PATCH) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          sed -i "s/<version>/$NEW_VERSION/" IsChrisVaping/version.h
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Install ESP32 core and libraries
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli lib install "Adafruit GFX Library" "Adafruit ST7735 and ST7789 Library"

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32:CPUFreq=80,FlashFreq=80,FlashMode=qio,FlashSize=16M,PartitionScheme=app3M_fat9M_16MB,EraseFlash=none" \
            --output-dir IsChrisVaping/build \
            IsChrisVaping

      - name: Upload firmware to server
        run: |
          curl -f -X POST \
            "${{ secrets.SERVER_URL }}/firmware/upload?version=${{ steps.version.outputs.version }}" \
            -H "Authorization: Bearer ${{ secrets.FIRMWARE_TOKEN }}" \
            -F "file=@IsChrisVaping/build/IsChrisVaping.ino.bin;type=application/octet-stream"
