name: Build and Upload Firmware

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      firmware_changed: ${{ steps.filter.outputs.firmware }}
    steps:
      - uses: actions/checkout@v6

      - name: Check for firmware code changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            firmware:
              - 'firmware/**'

  build-and-upload:
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.firmware_changed == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Determine version bump
        id: bump
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ "$TITLE" =~ ^MAJOR ]]; then
            echo "type=MAJOR" >> $GITHUB_OUTPUT
          elif [[ "$TITLE" =~ ^MINOR ]]; then
            echo "type=MINOR" >> $GITHUB_OUTPUT
          elif [[ "$TITLE" =~ ^PATCH ]]; then
            echo "type=PATCH" >> $GITHUB_OUTPUT
          else
            echo "::error::PR title must start with MAJOR, MINOR, or PATCH"
            exit 1
          fi

      - name: Get current version from server and bump
        id: version
        run: |
          RESPONSE=$(curl -sf "${{ secrets.SERVER_URL }}/firmware/latest?variant=esp32" || echo '{}')
          CURRENT=$(echo "$RESPONSE" | jq -r '.version // "0.0.0"')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ steps.bump.outputs.type }}" in
            MAJOR) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            MINOR) MINOR=$((MINOR + 1)); PATCH=0 ;;
            PATCH) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          sed -i "s/<dev>/$NEW_VERSION/" firmware/IsChrisVaping/version.h
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware (esp32)
        working-directory: firmware
        env:
          IDF_COMPONENT_MANAGER: "0"
        run: pio run -e esp32

      - name: Build firmware (esp32_4mb)
        working-directory: firmware
        env:
          IDF_COMPONENT_MANAGER: "0"
        run: pio run -e esp32_4mb

      - name: Upload firmware (esp32)
        run: |
          curl -f -X POST \
            "${{ secrets.SERVER_URL }}/firmware/upload?version=${{ steps.version.outputs.version }}&variant=esp32" \
            -H "Authorization: Bearer ${{ secrets.FIRMWARE_TOKEN }}" \
            -F "file=@firmware/.pio/build/esp32/firmware.bin;type=application/octet-stream"

      - name: Upload firmware (esp32_4mb)
        run: |
          curl -f -X POST \
            "${{ secrets.SERVER_URL }}/firmware/upload?version=${{ steps.version.outputs.version }}&variant=esp32_4mb" \
            -H "Authorization: Bearer ${{ secrets.FIRMWARE_TOKEN }}" \
            -F "file=@firmware/.pio/build/esp32_4mb/firmware.bin;type=application/octet-stream"
