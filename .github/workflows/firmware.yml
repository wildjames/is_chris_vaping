name: Build and Upload Firmware

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Determine version bump
        id: bump
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" =~ ^MAJOR ]]; then
            echo "type=MAJOR" >> $GITHUB_OUTPUT
          elif [[ "$MSG" =~ ^MINOR ]]; then
            echo "type=MINOR" >> $GITHUB_OUTPUT
          elif [[ "$MSG" =~ ^PATCH ]]; then
            echo "type=PATCH" >> $GITHUB_OUTPUT
          else
            echo "::error::Commit message must start with MAJOR, MINOR, or PATCH"
            exit 1
          fi

      - name: Get current version from server and bump
        id: version
        run: |
          RESPONSE=$(curl -sf "${{ secrets.SERVER_URL }}/firmware/latest" || echo '{}')
          CURRENT=$(echo "$RESPONSE" | jq -r '.version // "0.0.0"')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ steps.bump.outputs.type }}" in
            MAJOR) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            MINOR) MINOR=$((MINOR + 1)); PATCH=0 ;;
            PATCH) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio adafruit-nrfutil

      - name: Build firmware (nrf52840)
        working-directory: firmware/nrf52840
        env:
          PLATFORMIO_BUILD_FLAGS: -DFIRMWARE_VERSION='"${{ steps.version.outputs.version }}"'
        run: pio run -e nrf52840_ota

      - name: Package nRF52840 DFU zip
        run: |
          adafruit-nrfutil dfu genpkg \
            --dev-type 0x0052 \
            --sd-req 0xFFFE \
            --application firmware/nrf52840/.pio/build/nrf52840_ota/firmware.hex \
            firmware_nrf52840.zip

      - name: Upload firmware (nrf52840)
        run: |
          curl -f -X POST \
            "${{ secrets.SERVER_URL }}/firmware/upload?version=${{ steps.version.outputs.version }}" \
            -H "Authorization: Bearer ${{ secrets.FIRMWARE_TOKEN }}" \
            -F "file=@firmware_nrf52840.zip;type=application/octet-stream"
