name: Validate PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Arduino code changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            firmware:
              - 'firmware/**'

      - name: Check PR title prefix
        if: steps.filter.outputs.firmware == 'true'
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ "$TITLE" =~ ^(MAJOR|MINOR|PATCH) ]]; then
            echo "Valid PR title: $TITLE"
          else
            echo "::error::PR title must start with MAJOR, MINOR, or PATCH. Got: $TITLE"
            exit 1
          fi

      - name: Skip title check
        if: steps.filter.outputs.firmware == 'false'
        run: echo "No Arduino code changes, skipping PR title prefix check."
