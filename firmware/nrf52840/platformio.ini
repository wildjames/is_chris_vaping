[platformio]
src_dir = src
default_envs = nrf52840

; Shared settings
[env]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SPIFlash@>=4.0.0
    adafruit/SdFat - Adafruit Fork@>=1.4.0

; USB upload — always overwrites pin config with compiled defaults
[env:nrf52840]
build_flags = -DFORCE_DEFAULT_CONFIG

; OTA build — preserves existing pin config in flash
[env:nrf52840_ota]

