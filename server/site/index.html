<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Vaping Right Now?</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
    <style>
      body {
        font-family: "Roboto", sans-serif;
      }
    </style>
</head>
<body>
  <audio id="bg-audio" src="Vengaboys-We-like-to-Party-The-Vengabus-128k.mp3" loop muted autoplay></audio>
  <div id="rgb-overlay" class="rgb-overlay"></div>
  <div id="gif-bounce-container" class="gif-bounce-container" style="display:none;"></div>
  <script src="script.js" defer></script>

  <div class="box">
    <div>
      <h1>Who's vaping right now?</h1>
      <br/>
      <p id="status_par" class="status">...</p>
    </div>
  </div>
  <div id="dev-controls" class="dev-controls" style="display:none;">
    <button id="btn-dev-mode">Dev Mode: OFF</button>
    <button id="btn-toggle-state" style="display:none;">Toggle Vape State</button>
  </div>
  <button id="btn-sound" class="sound-btn" title="Enable sound" aria-label="Enable sound"> 🔊 </button>
  <div class="footer">
    <p id="debug_par" class="status debug">...</p>
  </div>
</body>
</html>
