services:
  vape-server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - VAPE_API_TOKEN=${VAPE_API_TOKEN}
      - VAPE_SERVER_URL=${VAPE_SERVER_URL}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
