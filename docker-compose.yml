services:
  vape-server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - VAPE_API_TOKEN=${VAPE_API_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - firmware_data:/firmware
      - ./server/site:/app/site
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  firmware_data:
